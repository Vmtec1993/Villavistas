<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>MoreVistas | Luxury Villa Rentals</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3">
        <a class="navbar-brand font-weight-bold" href="/">MOREVISTAS</a>
        <div>
            {% if user.is_authenticated %}
                <a href="/bookings/" class="text-white me-3">My Bookings</a>
                <a href="/admin/" class="btn btn-outline-light">Admin Panel</a>
            {% else %}
                <a href="/login/" class="btn btn-primary">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container mt-5">
        <h2 className="mb-4">Featured Vistas</h2>
        <div class="row">
            {% for villa in villas %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <img src="{{ villa.image.url }}" class="card-img-top" height="200">
                    <div class="card-body">
                        <h5>{{ villa.title }}</h5>
                        <p class="text-muted">{{ villa.location }}</p>
                        <p class="fw-bold text-primary">${{ villa.price_per_night }} / night</p>
                        <a href="/villa/{{ villa.id }}/" class="btn btn-dark w-100">View Villa</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
